<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LiveSync Networking</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
<div class="logo">in</div>
<input class="search" placeholder="Search">
</header>

<div class="container">

<h1>LiveSync Session</h1>

<div class="tabs">
<button onclick="showTab('people')" id="peopleTab">People (4)</button>
<button onclick="showTab('received')" id="receivedTab">Req Received (0)</button>
<button onclick="showTab('sent')" id="sentTab">Req Sent (0)</button>
</div>

<!-- PEOPLE TAB -->

<div id="people" class="tabContent">

<div class="personCard">
<div>
<div class="name">Rahul Sharma</div>
<div class="title">MBA Candidate</div>
</div>
<button class="connectBtn">Connect</button>
</div>

<div class="personCard">
<div>
<div class="name">Priya Patel</div>
<div class="title">Finance Enthusiast</div>
</div>
<button class="connectBtn">Connect</button>
</div>

<div class="personCard">
<div>
<div class="name">Sofia Khan</div>
<div class="title">Product Manager</div>
</div>
<button class="connectBtn">Connect</button>
</div>

<div class="personCard">
<div>
<div class="name">John Mathew</div>
<div class="title">Software Engineer</div>
</div>
<button class="connectBtn">Connect</button>
</div>

</div>

<!-- RECEIVED TAB -->

<div id="received" class="tabContent hidden">
<p>No requests yet</p>
</div>

<!-- SENT TAB -->

<div id="sent" class="tabContent hidden">
<div id="sentList"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
